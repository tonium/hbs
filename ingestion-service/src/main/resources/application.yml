server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ingestion-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hbs}
    username: ${DB_USERNAME:hbs}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: false  # 마이그레이션은 subscription-service에서 관리
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/hbs/protocol/openid-connect/certs}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
